<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#10b981" />
    <title>Daily PWA | Offline</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        background: radial-gradient(circle at top, #0f172a, #020617 70%);
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid #1f2937;
        border-radius: 20px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.5;
        color: #cbd5f5;
      }
      button {
        border: none;
        background: #10b981;
        color: #0f172a;
        padding: 10px 16px;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Daily PWA works offline for saved screens. We will reconnect automatically when your network returns.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
